version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kwitt-backend
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
      - PORT=3001
    volumes:
      - portfolio-shared:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: kwitt-frontend
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:3001
    volumes:
      - portfolio-shared:/app/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    container_name: kwitt-bot
    env_file:
      - ../.env
    environment:
      - API_URL=http://backend:3001
    volumes:
      - portfolio-shared:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  portfolio-shared:

networks:
  default:
    name: kwitt-network
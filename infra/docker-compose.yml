version: '3.8'

services:
  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    container_name: kwitt-bot
    env_file:
      - ../.env
    environment:
      - DOCKER=true
      - AGENTS_ENABLED=true
      - AGENTS_URL=http://agents:8000
    volumes:
      - portfolio-shared:/app/data
      - workspace:/app/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - agents
    restart: unless-stopped

  agents:
    build:
      context: ../agents
      dockerfile: Dockerfile
    container_name: kwitt-agents
    env_file:
      - ../.env
    environment:
      - WORKSPACE=/app/workspace
      - PYTHONUNBUFFERED=1
      - DEPLOY_ENABLED=false
    volumes:
      - workspace:/app/workspace
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  opencode:
    image: alexandremblah/opencode:latest
    container_name: kwitt-opencode
    volumes:
      - workspace:/app/workspace
      - ../skills:/app/skills:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
    command: ["sleep", "infinity"]
    restart: unless-stopped

volumes:
  portfolio-shared:
  workspace:

networks:
  default:
    name: kwitt-network

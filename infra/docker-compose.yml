version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kwitt-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ../portfolio.json:/app/portfolio.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: kwitt-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    container_name: kwitt-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - API_URL=http://backend:3001
    volumes:
      - ../portfolio.json:/app/portfolio.json
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: kwitt-network